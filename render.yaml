# Render Blueprint for ghvac-tools.
# Deploy: push to GitHub, then in Render → New → Blueprint, pick this repo.
# Secrets are marked sync:false — set their values in the Render dashboard
# (Environment tab), NOT here, so they never land in git.
services:
  - type: web
    name: ghvac-tools
    runtime: docker # Docker build bundles Chromium + poppler for salesbook PDFs
    dockerfilePath: ./Dockerfile
    plan: standard # Chromium PDF rendering needs headroom; starter (512MB) may OOM
    region: oregon # pick the region closest to your Neon project
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # Render injects PORT automatically; the app reads process.env.PORT.
      - key: NODE_ENV
        value: production

      # ── Android app (Play Store / sideload) ─────────────────────────
      # Cert fingerprints are public info, safe to commit. First entry is
      # the local upload/signing key from the PWABuilder package; append
      # Google's app-signing-key fingerprint (Play Console → App signing)
      # separated by a comma once retrieved.
      - key: ANDROID_PACKAGE_NAME
        value: app.ghvac.tools
      - key: ANDROID_APP_FINGERPRINTS
        value: "EA:9D:A0:1B:84:A4:00:AC:9A:59:E3:7C:41:72:79:77:7D:C4:8F:FC:C8:FA:BA:9F:C2:3E:CC:81:23:55:49:B7"

      # ── Core (required) ──────────────────────────────────────────────
      - key: DATABASE_URL # Neon pooled connection string
        sync: false
      - key: SESSION_SECRET # long random string; app refuses to boot without it in prod
        sync: false

      # ── Legacy API gate + admin ──────────────────────────────────────
      - key: GLOBAL_PASSWORD # turns on server-side auth for the legacy /api routes
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: ADMIN_API_KEY
        sync: false

      # ── AI ───────────────────────────────────────────────────────────
      - key: OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false

      # ── Stripe ───────────────────────────────────────────────────────
      - key: STRIPE_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false

      # ── Email (Resend) ───────────────────────────────────────────────
      - key: RESEND_API_KEY
        sync: false
      - key: FROM_EMAIL
        sync: false

      # ── SMS ──────────────────────────────────────────────────────────
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: TEXTLINE_API_KEY
        sync: false
      - key: TEXTLINE_WEBHOOK_SECRET
        sync: false

      # ── Google OAuth (CRM staff sign-in) ─────────────────────────────
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_OAUTH_REDIRECT_URI # https://<your-render-domain>/api/crm/auth/google/callback
        sync: false

      # ── QuickBooks ───────────────────────────────────────────────────
      - key: QUICKBOOKS_CLIENT_ID
        sync: false
      - key: QUICKBOOKS_CLIENT_SECRET
        sync: false

      # ── Trello ───────────────────────────────────────────────────────
      - key: TRELLO_API_KEY
        sync: false
      - key: TRELLO_TOKEN
        sync: false
      - key: TRELLO_SECRET
        sync: false

      # ── Govee environmental sensors (temp/humidity remote monitoring) ──
      # Server polls openapi.api.govee.com with this key. Without it, prod
      # never pulls sensor data. Set the value in the Render dashboard.
      - key: GOVEE_API_KEY
        sync: false

      # NOTE: add any remaining vars from .env you actually use (Bouncie,
      # Govee, weather, etc.) via the Render dashboard the same way.
      #
      # Do NOT set REPL_ID here — its absence is what makes the app use the
      # Neon-backed file store instead of the Replit object-storage sidecar.
      #
      # Salesbook PDF export works: the Dockerfile installs Chromium (Playwright)
      # and poppler-utils (pdftoppm). No extra env needed — playwright-core
      # resolves the browser from PLAYWRIGHT_BROWSERS_PATH set in the image.
